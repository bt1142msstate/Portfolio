<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandon Temple Resume</title>
    <link rel="stylesheet" href="resume.css">
    <link rel="stylesheet" href="resume-print.css" media="print">
</head>
<body data-page="resume">
    <div class="resume-actions no-print">
        <a href="../index.html" class="resume-action-link">Back to Site</a>
        <button type="button" class="resume-action-button" id="print-resume-button">Print or Save PDF</button>
    </div>
    <main class="resume">
        <header class="hero">
            <div>
                <p class="eyebrow">Software Engineer</p>
                <h1>Brandon Temple</h1>
                <p class="summary" id="resume-summary"></p>
            </div>
            <div class="contact-card" id="resume-contact"></div>
        </header>

        <section class="section">
            <h2>Technical Skills</h2>
            <div class="skills-grid" id="resume-skills"></div>
        </section>

        <section class="section">
            <h2>Professional Experience</h2>
            <div id="resume-experience"></div>
        </section>

        <section class="section page-break">
            <div class="two-column">
                <div>
                    <h2>Additional Experience</h2>

                    <div id="resume-additional-experience"></div>

                    <h2>Education</h2>
                    <div id="resume-education"></div>
                </div>

                <div>
                    <h2>Projects</h2>
                    <div id="resume-projects"></div>
                </div>
            </div>
        </section>
    </main>
    <script src="../assets/js/profile-data.js"></script>
    <script src="../assets/js/profile-render.js"></script>
    <script src="print.js"></script>
</body>
</html>
